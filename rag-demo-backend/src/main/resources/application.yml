spring:
  application:
    name: rag-demo-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.50.6:3306/rag_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      client-type: jedis
      host: ${REDIS_HOST:192.168.50.6}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:${OPENAPI_KEY:local-placeholder}}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.0
      embedding:
        options:
          model: qwen3.7-text-embedding
          dimensions: 2560
    vectorstore:
      redis:
        initialize-schema: false
        index-name: rag-demo-index-v2
        prefix: "rag:chunk:"
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rag:
  storage-root: ${RAG_STORAGE_ROOT:/Users/zhangzhewen/data/ragdemo/uploads}
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-at-least-32-bytes}
    access-ttl: 30m
    refresh-ttl: 7d
  retrieval:
    top-k: ${RAG_TOP_K:10}
    candidate-top-k: ${RAG_CANDIDATE_TOP_K:20}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.2}
  context:
    max-input-tokens: ${RAG_CONTEXT_MAX_INPUT_TOKENS:24000}
    reserved-output-tokens: ${RAG_CONTEXT_RESERVED_OUTPUT_TOKENS:4000}
    recent-turns: ${RAG_CONTEXT_RECENT_TURNS:4}
    summary-trigger-tokens: ${RAG_CONTEXT_SUMMARY_TRIGGER_TOKENS:8000}
    max-summary-tokens: ${RAG_CONTEXT_MAX_SUMMARY_TOKENS:1200}
    min-evidence-tokens: ${RAG_CONTEXT_MIN_EVIDENCE_TOKENS:8000}
  reranking:
    enabled: ${RAG_RERANK_ENABLED:true}
    model: ${RAG_RERANK_MODEL:qwen3-rerank}
    base-url: ${DASHSCOPE_RERANK_BASE_URL:https://dashscope.aliyuncs.com/compatible-api/v1/reranks}
    api-key: ${DASHSCOPE_API_KEY:${OPENAPI_KEY:local-placeholder}}
    timeout: ${RAG_RERANK_TIMEOUT:5s}
  ingestion:
    chunk-size: 800
    chunk-overlap: 100
    embedding-batch-size: 20
  evaluation:
    pipeline-version: ${RAG_EVALUATION_PIPELINE_VERSION:v1}
    judge-model: ${RAG_EVALUATION_JUDGE_MODEL:deepseek-v4-flash}
    candidate-hit-rate: ${RAG_EVALUATION_CANDIDATE_HIT_RATE:0.9}
    candidate-mrr: ${RAG_EVALUATION_CANDIDATE_MRR:0.10}
    context-recall: ${RAG_EVALUATION_CONTEXT_RECALL:0.8}
    context-precision: ${RAG_EVALUATION_CONTEXT_PRECISION:0.10}
    faithfulness: ${RAG_EVALUATION_FAITHFULNESS:0.8}
    answer-relevancy: ${RAG_EVALUATION_ANSWER_RELEVANCY:0.8}
    evidence-support-accuracy: ${RAG_EVALUATION_EVIDENCE_SUPPORT_ACCURACY:0.8}
    no-answer-accuracy: ${RAG_EVALUATION_NO_ANSWER_ACCURACY:0.9}
    max-regression: ${RAG_EVALUATION_MAX_REGRESSION:0.03}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: ${AI_INTERACTION_LOG_LEVEL:DEBUG}
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
  file:
    name: log/main.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
